version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_WS_URL: ""   # empty = use relative /ws (proxied by nginx)
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
